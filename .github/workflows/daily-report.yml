name: Daily Repo Intelligence

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-report:
    runs-on: ubuntu-latest
    env:
      WORKSPACE: ${{ github.workspace }}
      GH_TOKEN: ${{ secrets.BOUND_REPO_TOKEN || github.token }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: gpt-5.5

    steps:
      - name: Check out dashboard repo
        uses: actions/checkout@v4

      - name: Install summary dependency
        run: python3 -m pip install --quiet openai

      - name: Generate dashboard
        run: |
          chmod +x sync.sh daily-report.sh
          ./daily-report.sh
          cp repo-intelligence-report.html index.html

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html repo-intelligence-report.html
          if git diff --cached --quiet; then
            echo "No dashboard changes to commit."
          else
            git commit -m "Update daily repo intelligence"
            git push
          fi
